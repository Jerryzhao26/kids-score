<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小勇士成长系统</title>
    <style>
        /* 强制 Safari 适配 */
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .item { padding: 16px; border: 1px solid #ccc; margin: 8px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .btn { padding: 12px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <h1 id="totalBalance" onclick="adjustBalance()">0</h1>
        <div id="listArea"></div>
    </div>

<script>
    // 定义数据结构
    var store = JSON.parse(localStorage.getItem('kid_growth_db') || '{"balance":0, "clicks":[], "daily":{}}');

    function save() {
        localStorage.setItem('kid_growth_db', JSON.stringify(store));
        render();
    }

    function render() {
        document.getElementById('totalBalance').innerText = "当前积分: " + store.balance;
        var list = document.getElementById('listArea');
        list.innerHTML = '';
        
        // 渲染测试按钮（仅测试点击功能）
        var btn = document.createElement('div');
        btn.className = 'item';
        btn.innerText = "测试点击加1分";
        btn.onclick = function() {
            store.balance += 1;
            save();
        };
        list.appendChild(btn);
    }

    function adjustBalance() {
        var pwd = prompt("请输入密码：");
        if (pwd === "jerry215") {
            var val = prompt("输入新积分：");
            if (val) { store.balance = parseInt(val); save(); }
        }
    }

    // 初始渲染
    render();
</script>
</body>
</html>
